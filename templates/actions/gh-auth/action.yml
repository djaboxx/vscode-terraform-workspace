name: "Authenticate GitHub App"
description: |
  Mints a short-lived installation token for a GitHub App and exposes it as the
  `token` output (also re-exported as the env var `GH_TOKEN` so subsequent
  `gh ...` and Terraform `github` provider calls pick it up automatically).

  Inputs default to the env vars `APP_ID` and `APP_PRIVATE_KEY`, so the typical
  workflow only needs to set those once at the job level.

inputs:
  app-id:
    description: "GitHub App ID. Defaults to APP_ID env var."
    required: false
    default: ""
  private-key:
    description: "GitHub App private key (PEM). Defaults to APP_PRIVATE_KEY env var."
    required: false
    default: ""
  owner:
    description: "Owner the installation token should be scoped to. Defaults to current repo owner."
    required: false
    default: ""
  repositories:
    description: "Comma-separated repos to scope the token to. Defaults to the current repo."
    required: false
    default: ""

outputs:
  token:
    description: "Installation token (also exported as GH_TOKEN for downstream steps)."
    value: ${{ steps.app.outputs.token }}
  installation-id:
    description: "GitHub App installation ID resolved for the owner."
    value: ${{ steps.app.outputs.installation-id }}

runs:
  using: "composite"
  steps:
    - name: "Resolve inputs"
      id: resolve
      shell: bash
      run: |
        APP_ID_VAL="${{ inputs.app-id }}"
        [ -z "$APP_ID_VAL" ] && APP_ID_VAL="${APP_ID:-}"
        PRIV_VAL="${{ inputs.private-key }}"
        [ -z "$PRIV_VAL" ] && PRIV_VAL="${APP_PRIVATE_KEY:-}"
        if [ -z "$APP_ID_VAL" ] || [ -z "$PRIV_VAL" ]; then
          echo "::error::gh-auth: APP_ID and APP_PRIVATE_KEY must be set (as inputs or env)."
          exit 1
        fi
        # Don't echo secrets — only signal presence
        echo "app_id_set=true"      >> "$GITHUB_OUTPUT"
        echo "private_key_set=true" >> "$GITHUB_OUTPUT"

    - name: "Mint installation token"
      id: app
      uses: actions/create-github-app-token@v1
      with:
        app-id:       ${{ inputs.app-id != '' && inputs.app-id || env.APP_ID }}
        private-key:  ${{ inputs.private-key != '' && inputs.private-key || env.APP_PRIVATE_KEY }}
        owner:        ${{ inputs.owner != '' && inputs.owner || github.repository_owner }}
        repositories: ${{ inputs.repositories }}

    - name: "Export GH_TOKEN"
      shell: bash
      run: |
        echo "::add-mask::${{ steps.app.outputs.token }}"
        echo "GH_TOKEN=${{ steps.app.outputs.token }}"     >> "$GITHUB_ENV"
        echo "GITHUB_TOKEN=${{ steps.app.outputs.token }}" >> "$GITHUB_ENV"
