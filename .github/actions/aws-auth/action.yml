name: "AWS Auth"
description: "Configures AWS credentials for Terraform. Supports OIDC (default), long-lived access keys, runner-managed profiles, or no-op for non-AWS backends. Always exports the resolved credentials as outputs (when available) so downstream steps can re-export them via env."

inputs:
  auth-mode:
    description: "One of: oidc | access-keys | profile | none. Defaults to AWS_AUTH_MODE env var, then 'oidc'."
    required: false
    default: ""
  ecs:
    description: "Compatibility flag with the upstream contract. Kept for backward compatibility; credentials are always exported as outputs when available."
    required: false
    default: "true"
  role-to-assume:
    description: "IAM role ARN. Required for `oidc`. Optional for `access-keys` (chained AssumeRole). Ignored for `profile`/`none`. Defaults to AWS_ROLE_TO_ASSUME env var."
    required: false
    default: ""
  aws-region:
    description: "AWS region. Defaults to TF_STATE_REGION env var, then AWS_REGION, then us-east-1."
    required: false
    default: ""
  role-session-name:
    description: "Session name."
    required: false
    default: "github-actions-terraform"
  aws-access-key-id:
    description: "Access key ID for `access-keys` mode. Defaults to AWS_ACCESS_KEY_ID env var (typically wired from a secret)."
    required: false
    default: ""
  aws-secret-access-key:
    description: "Secret access key for `access-keys` mode. Defaults to AWS_SECRET_ACCESS_KEY env var."
    required: false
    default: ""
  aws-session-token:
    description: "Optional session token for `access-keys` mode (when using temporary creds). Defaults to AWS_SESSION_TOKEN env var."
    required: false
    default: ""
  aws-profile:
    description: "Optional named profile to select on a self-hosted runner in `profile` mode. Defaults to AWS_PROFILE env var."
    required: false
    default: ""

outputs:
  aws_access_key_id:
    description: "Access key ID for downstream env passthrough (empty in `profile`/`none` modes)."
    value: ${{ steps.export.outputs.aws_access_key_id }}
  aws_secret_access_key:
    description: "Secret access key for downstream env passthrough (empty in `profile`/`none` modes)."
    value: ${{ steps.export.outputs.aws_secret_access_key }}
  aws_session_token:
    description: "Session token for downstream env passthrough (empty in `profile`/`none` modes)."
    value: ${{ steps.export.outputs.aws_session_token }}
  auth_mode:
    description: "The mode that was actually applied (after env-var resolution)."
    value: ${{ steps.resolve.outputs.mode }}

runs:
  using: "composite"
  steps:
    - name: "Resolve auth mode and region"
      id: resolve
      shell: bash
      run: |
        MODE="${{ inputs.auth-mode }}"
        [ -z "$MODE" ] && MODE="${AWS_AUTH_MODE:-}"
        [ -z "$MODE" ] && MODE="oidc"
        case "$MODE" in
          oidc|access-keys|profile|none) ;;
          *)
            echo "::error::Invalid auth-mode '$MODE'. Expected: oidc | access-keys | profile | none."
            exit 1
            ;;
        esac

        ROLE="${{ inputs.role-to-assume }}"
        [ -z "$ROLE" ] && ROLE="${AWS_ROLE_TO_ASSUME:-}"

        REGION="${{ inputs.aws-region }}"
        [ -z "$REGION" ] && REGION="${TF_STATE_REGION:-}"
        [ -z "$REGION" ] && REGION="${AWS_REGION:-}"
        [ -z "$REGION" ] && REGION="us-east-1"

        echo "mode=$MODE"     >> "$GITHUB_OUTPUT"
        echo "role=$ROLE"     >> "$GITHUB_OUTPUT"
        echo "region=$REGION" >> "$GITHUB_OUTPUT"
        echo "Selected AWS auth mode: $MODE (region=$REGION)"

        if [ "$MODE" = "oidc" ] && [ -z "$ROLE" ]; then
          echo "::error::auth-mode=oidc requires AWS_ROLE_TO_ASSUME or the role-to-assume input."
          exit 1
        fi

    # ── OIDC ─────────────────────────────────────────────────────────────────
    - name: "Configure AWS Credentials (OIDC)"
      if: steps.resolve.outputs.mode == 'oidc'
      id: oidc
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume:      ${{ steps.resolve.outputs.role }}
        aws-region:          ${{ steps.resolve.outputs.region }}
        role-session-name:   ${{ inputs.role-session-name }}
        output-credentials:  true

    # ── Static access keys (optionally chained AssumeRole) ───────────────────
    - name: "Resolve access keys"
      id: keys
      if: steps.resolve.outputs.mode == 'access-keys'
      shell: bash
      run: |
        AK="${{ inputs.aws-access-key-id }}"
        SK="${{ inputs.aws-secret-access-key }}"
        ST="${{ inputs.aws-session-token }}"
        [ -z "$AK" ] && AK="${AWS_ACCESS_KEY_ID:-}"
        [ -z "$SK" ] && SK="${AWS_SECRET_ACCESS_KEY:-}"
        [ -z "$ST" ] && ST="${AWS_SESSION_TOKEN:-}"
        if [ -z "$AK" ] || [ -z "$SK" ]; then
          echo "::error::auth-mode=access-keys requires AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (env vars or inputs)."
          exit 1
        fi
        echo "::add-mask::$AK"
        echo "::add-mask::$SK"
        [ -n "$ST" ] && echo "::add-mask::$ST"
        echo "ak=$AK" >> "$GITHUB_OUTPUT"
        echo "sk=$SK" >> "$GITHUB_OUTPUT"
        echo "st=$ST" >> "$GITHUB_OUTPUT"

    - name: "Configure AWS Credentials (access-keys)"
      if: steps.resolve.outputs.mode == 'access-keys'
      id: ak
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id:     ${{ steps.keys.outputs.ak }}
        aws-secret-access-key: ${{ steps.keys.outputs.sk }}
        aws-session-token:     ${{ steps.keys.outputs.st }}
        aws-region:            ${{ steps.resolve.outputs.region }}
        # Optional chained AssumeRole — only applied when role-to-assume is set.
        role-to-assume:        ${{ steps.resolve.outputs.role }}
        role-session-name:     ${{ inputs.role-session-name }}
        output-credentials:    true

    # ── Profile / instance role (self-hosted runners) ────────────────────────
    - name: "Configure runner profile"
      if: steps.resolve.outputs.mode == 'profile'
      shell: bash
      run: |
        PROFILE="${{ inputs.aws-profile }}"
        [ -z "$PROFILE" ] && PROFILE="${AWS_PROFILE:-}"
        echo "AWS_REGION=${{ steps.resolve.outputs.region }}" >> "$GITHUB_ENV"
        if [ -n "$PROFILE" ]; then
          echo "AWS_PROFILE=$PROFILE" >> "$GITHUB_ENV"
          echo "Using AWS profile: $PROFILE"
        else
          echo "No AWS_PROFILE set — relying on instance role / default credential chain."
        fi

    # ── No-op (non-AWS backends) ─────────────────────────────────────────────
    - name: "Skip AWS auth"
      if: steps.resolve.outputs.mode == 'none'
      shell: bash
      run: echo "auth-mode=none — skipping AWS authentication."

    # ── Export resolved credentials (oidc / access-keys only) ────────────────
    - name: "Export credentials as outputs"
      id: export
      shell: bash
      env:
        OIDC_AK:  ${{ steps.oidc.outputs.aws-access-key-id }}
        OIDC_SK:  ${{ steps.oidc.outputs.aws-secret-access-key }}
        OIDC_ST:  ${{ steps.oidc.outputs.aws-session-token }}
        AK_AK:    ${{ steps.ak.outputs.aws-access-key-id }}
        AK_SK:    ${{ steps.ak.outputs.aws-secret-access-key }}
        AK_ST:    ${{ steps.ak.outputs.aws-session-token }}
      run: |
        AK="${OIDC_AK:-$AK_AK}"
        SK="${OIDC_SK:-$AK_SK}"
        ST="${OIDC_ST:-$AK_ST}"
        if [ -n "$AK" ]; then
          echo "::add-mask::$AK"
          echo "::add-mask::$SK"
          [ -n "$ST" ] && echo "::add-mask::$ST"
        fi
        echo "aws_access_key_id=$AK"     >> "$GITHUB_OUTPUT"
        echo "aws_secret_access_key=$SK" >> "$GITHUB_OUTPUT"
        echo "aws_session_token=$ST"     >> "$GITHUB_OUTPUT"
