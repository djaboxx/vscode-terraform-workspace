name: Test composite actions
on:
  pull_request:
    paths:
      - 'templates/actions/**'
      - '.github/workflows/test-actions.yml'
  push:
    branches: [main]
    paths:
      - 'templates/actions/**'

jobs:
  lint:
    name: Lint action.yml files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint + actionlint
        run: |
          pip install --quiet yamllint
          curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv actionlint /usr/local/bin/

      - name: yamllint composite actions
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: disable}}' templates/actions/

      - name: actionlint composite actions
        run: |
          for f in templates/actions/*/action.yml; do
            echo "→ $f"
            actionlint -shellcheck= "$f" || exit 1
          done

  smoke:
    name: Smoke-test actions wired together
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Materialize a fake repo with the actions
        run: |
          mkdir -p smoke/.github/actions
          cp -r templates/actions/* smoke/.github/actions/
          cat > smoke/main.tf <<'TF'
          terraform { required_version = ">= 1.6.0" }
          output "ok" { value = "smoke" }
          TF

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest
          tofu_wrapper: false

      - name: tofu init/plan in fake repo
        working-directory: smoke
        env:
          TF_CLI: tofu
        run: |
          tofu init -input=false -backend=false
          tofu validate
          tofu plan -input=false
