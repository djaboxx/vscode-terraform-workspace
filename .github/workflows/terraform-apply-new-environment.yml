# Generated by Terraform Workspace VS Code Extension
# Re-sync: Ctrl/Cmd+Shift+P → "Terraform: Sync Workflows"
# WARNING: Do not edit manually — changes will be overwritten on next sync.

name: "Terraform Apply — new-environment"

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: "Terraform workspace"
        required: false
        default: "new-environment"
      working_directory:
        description: "Working directory containing Terraform configuration"
        required: false
        default: "."
  push:
    branches:
      - "main"

concurrency:
  group: "terraform-new-environment"
  cancel-in-progress: false

env:
  # ── Tooling ──────────────────────────────────────────────────────────────
  TF_CLI: tofu
  # ── State backend ─────────────────────────────────────────────────────────
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
  TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
  TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX }}
  # ── Plan / apply artifact cache ────────────────────────────────────────────
  TF_CACHE_BUCKET: ${{ vars.TF_CACHE_BUCKET }}
  # ── Variables (non-sensitive) ─────────────────────────────────────────────
  BOOGERS: ${{ vars.BOOGERS }}
  # ── Secrets ──────────────────────────────────────────────────────────────
  BOOTY: ${{ secrets.BOOTY }}

jobs:
  # ── Job 1: Plan ─────────────────────────────────────────────────────────────
  # Runs immediately (no environment gate) and uploads the plan binary to S3.
  # Reviewers will see this job's summary/logs when deciding whether to approve
  # the apply job below.
  plan:
    name: "Terraform Plan"
    runs-on: ["self-hosted"]
    permissions:
      id-token: write
      contents: read
    outputs:
      cache_key:       ${{ steps.init.outputs.cache_key }}
      pending_changes: ${{ steps.plan.outputs.pending_changes }}
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Configure AWS Credentials (OIDC)"
        uses: "./.github/actions/aws-auth"
        with:
          auth-mode: "oidc"

      - name: "Authenticate GitHub App"
        uses: "./.github/actions/gh-auth"

      - name: "Setup Terraform"
        uses: "./.github/actions/setup-terraform"

      - name: "Terraform Init"
        id: init
        uses: "./.github/actions/terraform-init"
        with:
          workspace: "new-environment"
          working_directory: "."
          backend_bucket: ${{ env.TF_STATE_BUCKET }}
          backend_region: ${{ env.TF_STATE_REGION }}
          backend_dynamodb_table: ${{ env.TF_STATE_DYNAMODB_TABLE }}
          backend_key: "${{ env.TF_STATE_KEY_PREFIX }}/${{ github.repository }}/new-environment/terraform.tfstate"
          cache_bucket: ${{ env.TF_CACHE_BUCKET }}

      - name: "Terraform Plan"
        id: plan
        uses: "./.github/actions/terraform-plan"
        with:
          workspace: "new-environment"
          working_directory: "."
          cache_bucket: ${{ env.TF_CACHE_BUCKET }}
          cache_key:    ${{ steps.init.outputs.cache_key }}
          varfile: "varfiles/new-environment.tfvars"

      - name: "Cache Cleanup"
        if: always()
        uses: "./.github/actions/s3-cleanup"
        with:
          cache_bucket: ${{ env.TF_CACHE_BUCKET }}
          cache_key:    ${{ steps.init.outputs.cache_key }}

  # ── Job 2: Apply ─────────────────────────────────────────────────────────────
  # Blocked by the environment protection rule until a reviewer approves.
  # At approval time, the plan job above is already complete — reviewers see
  # exactly what will be applied before clicking approve.
  # Applies the exact plan binary uploaded by the plan job (no re-plan).
  apply:
    name: "Terraform Apply"
    needs: plan
    if: needs.plan.outputs.pending_changes == 'true'
    runs-on: ["self-hosted"]
    environment: "new-environment"
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Configure AWS Credentials (OIDC)"
        uses: "./.github/actions/aws-auth"
        with:
          auth-mode: "oidc"

      - name: "Authenticate GitHub App"
        uses: "./.github/actions/gh-auth"

      - name: "Setup Terraform"
        uses: "./.github/actions/setup-terraform"

      - name: "Terraform Apply"
        uses: "./.github/actions/terraform-apply"
        with:
          workspace: "new-environment"
          working_directory: "."
          cache_bucket: ${{ env.TF_CACHE_BUCKET }}
          cache_key:    ${{ needs.plan.outputs.cache_key }}

      - name: "Cache Cleanup"
        if: always()
        uses: "./.github/actions/s3-cleanup"
        with:
          cache_bucket: ${{ env.TF_CACHE_BUCKET }}
          cache_key:    ${{ needs.plan.outputs.cache_key }}
