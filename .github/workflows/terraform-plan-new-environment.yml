# Generated by Terraform Workspace VS Code Extension
# Re-sync: Ctrl/Cmd+Shift+P → "Terraform: Sync Workflows"
# WARNING: Do not edit manually — changes will be overwritten on next sync.

name: "Terraform Plan — new-environment"

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: "Terraform workspace"
        required: false
        default: "new-environment"
      working_directory:
        description: "Working directory containing Terraform configuration"
        required: false
        default: "."
  pull_request:
    branches:
      - "main"

concurrency:
  group: "terraform-new-environment"
  cancel-in-progress: false

env:
  # ── Tooling ──────────────────────────────────────────────────────────────
  TF_CLI: tofu
  # ── State backend ─────────────────────────────────────────────────────────
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
  TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
  TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX }}
  # ── Plan / apply artifact cache ────────────────────────────────────────────
  TF_CACHE_BUCKET: ${{ vars.TF_CACHE_BUCKET }}
  # ── Variables (non-sensitive) ─────────────────────────────────────────────
  BOOGERS: ${{ vars.BOOGERS }}
  # ── Secrets ──────────────────────────────────────────────────────────────
  BOOTY: ${{ secrets.BOOTY }}

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: ["self-hosted"]
    environment: "new-environment"
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Configure AWS Credentials (OIDC)"
        uses: "./.github/actions/aws-auth"
        with:
          auth-mode: "oidc"

      - name: "Authenticate GitHub App"
        uses: "./.github/actions/gh-auth"

      - name: "Setup Terraform"
        uses: "./.github/actions/setup-terraform"

      - name: "Terraform Init"
        id: init
        uses: "./.github/actions/terraform-init"
        with:
          workspace: "new-environment"
          working_directory: "."
          backend_bucket: ${{ env.TF_STATE_BUCKET }}
          backend_region: ${{ env.TF_STATE_REGION }}
          backend_dynamodb_table: ${{ env.TF_STATE_DYNAMODB_TABLE }}
          backend_key: "${{ env.TF_STATE_KEY_PREFIX }}/${{ github.repository }}/new-environment/terraform.tfstate"
          cache_bucket: ${{ env.TF_CACHE_BUCKET }}

      - name: "Terraform Plan"
        uses: "./.github/actions/terraform-plan"
        with:
          workspace: "new-environment"
          working_directory: "."
          cache_bucket: ${{ env.TF_CACHE_BUCKET }}
          cache_key:    ${{ steps.init.outputs.cache_key }}
          varfile: "varfiles/new-environment.tfvars"

      - name: "Cache Cleanup"
        if: always()
        uses: "./.github/actions/s3-cleanup"
        with:
          cache_bucket: ${{ env.TF_CACHE_BUCKET }}
          cache_key:    ${{ steps.init.outputs.cache_key }}
