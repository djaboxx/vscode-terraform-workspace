name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  devcontainer-ci:
    name: Lint, Type-check, Test & Build (devcontainer)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache devcontainer build
        uses: actions/cache@v4
        with:
          path: .devcontainer-cache
          key: ${{ runner.os }}-devcontainer-${{ hashFiles('.devcontainer/**', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-devcontainer-

      - name: Build & run inside dev container
        uses: devcontainers/ci@v0.3
        with:
          configFile: .devcontainer/devcontainer.json
          userDataFolder: .devcontainer-cache
          # Install once, then run the canonical runbook verbs. Keep this list
          # in sync with `npm run help`.
          runCmd: |
            set -euo pipefail
            npm ci
            npm run lint
            npm run compile
            npm test -- --reporter=verbose
            npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
